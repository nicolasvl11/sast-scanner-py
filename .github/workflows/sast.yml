name: SAST Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  sast:
    name: Static Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Run SAST scan — JSON report
        run: |
          python cli.py scanner/ \
            --format json \
            --output sast-report.json \
            --severity MEDIUM \
            --exclude scanner/rules/
        continue-on-error: true  # don't skip artifact upload on findings

      - name: Run SAST scan — HTML report
        run: |
          python cli.py scanner/ \
            --format html \
            --output sast-report.html \
            --severity MEDIUM \
            --exclude scanner/rules/
        continue-on-error: true

      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            sast-report.json
            sast-report.html

      - name: Fail on CRITICAL or HIGH findings
        run: |
          python cli.py scanner/ --severity HIGH --exclude scanner/rules/

name: SAST Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  security-events: write
  contents: read

jobs:
  sast:
    name: Static Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Run SAST scan — SARIF (GitHub Code Scanning)
        run: |
          python cli.py scanner/ \
            --format sarif \
            --output sast-report.sarif \
            --exclude scanner/rules/
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: sast-report.sarif

      - name: Run SAST scan — HTML report
        run: |
          python cli.py scanner/ \
            --format html \
            --output sast-report.html \
            --exclude scanner/rules/
        continue-on-error: true

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-html-report
          path: sast-report.html

      - name: Fail on CRITICAL or HIGH findings
        run: |
          python cli.py scanner/ --severity HIGH --exclude scanner/rules/
